repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Whole-tree, every commit. Even when no Python files are staged, latent
      # drift in untouched files (a deleted helper that another file still
      # imports, an unused symbol that vulture should catch) gets surfaced now
      # rather than in CI.
      - id: ruff
        args: [--fix, .]
        pass_filenames: false
        always_run: true
      - id: ruff-format
        args: [.]
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: mypy (whole-tree, strict)
        # Run via `uv run` so we share the dev venv (pytest, hypothesis, etc.)
        # and avoid mypy seeing untyped decorators in tests because the hook's
        # own isolated env lacks pytest. Mirrors the vulture pattern below.
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

  - repo: local
    hooks:
      - id: vulture
        name: vulture (dead-code scan)
        # Run via `uv run` so we share the project venv and pick up
        # [tool.vulture] config from pyproject.toml. Avoids version drift.
        entry: uv run vulture
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

  - repo: local
    hooks:
      - id: claude-plugin-validate
        name: claude plugin validate (manifest + command frontmatter)
        # Walks .claude-plugin/plugin.json AND every commands/*.md frontmatter
        # block. Requires `claude` CLI on PATH (installed via @anthropic-ai/claude-code).
        # Catches YAML frontmatter errors that silently drop command metadata.
        entry: claude plugin validate .claude-plugin/plugin.json
        language: system
        files: '^(\.claude-plugin/.*\.json|commands/.*\.md|agents/.*\.md|skills/.*\.md)$'
        pass_filenames: false

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor
        # Scope to workflow files only; mirrors the CI workflows-lint job.
        # Dependabot config has a separate cooldown finding tracked outside
        # this task's ownership.
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/semgrep/semgrep
    rev: v1.159.0
    hooks:
      - id: semgrep
        # Local rules only; report-only on warnings (don't block commit).
        # ERROR-severity rules (like bare-except) still fail with --error.
        args: ["--config=.semgrep/", "--error", "--quiet", "--metrics=off"]
        pass_filenames: false
        always_run: true
