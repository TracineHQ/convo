name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Validate plugin manifests
        run: python3 scripts/validate_plugin_manifest.py

  typecheck:
    name: Mypy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Mypy
        run: uv run mypy .

  test:
    name: Test (Python ${{ matrix.python }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python version
        run: uv python pin ${{ matrix.python }}
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Verify migrations are bundled in the wheel
        run: |
          set -eu
          unzip -l dist/*.whl | grep -F 'convo/migrations/0001_init.sql' \
            || { echo "ERROR: 0001_init.sql missing from built wheel"; exit 1; }

  smoke:
    name: Smoke (end-to-end command surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python version
        run: uv python pin 3.12
      - name: Install convo as a tool
        run: uv tool install .
      - name: Smoke test command surface
        env:
          CONVO_DB: /tmp/smoke.db
          CONVO_BACKUP_DIR: /tmp/smoke-backups
          CLAUDE_PROJECTS_DIR: tests/fixtures/qa-projects
        run: |
          set -eu
          mkdir -p "$CONVO_BACKUP_DIR"
          convo index
          convo info
          convo search "tool" --limit 5 --json
          convo inspect $(convo search "tool" --limit 1 --json | python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["search"]["hits"][0]["session_id"][:8])') --json
          convo summary --since 30d --json
          convo diff --since 7d --json
          convo backup --auto
          convo snapshots --json
          convo restore --latest
      - name: Smoke bin/convo wrapper
        run: |
          PYTHONPATH=src ./bin/convo --help | head -3

  detect-secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run detect-secrets via pre-commit
        run: uv run pre-commit run detect-secrets --all-files
