# gitleaks configuration for convo.
# Uses the default ruleset; this file exists so we can extend over time.

[extend]
# Inherit gitleaks' default rules (recommended baseline).
useDefault = true

[allowlist]
description = "Allowlist for known-safe matches in convo."
paths = [
    # Test fixtures use synthetic IDs that may resemble UUIDs and tokens.
    '''tests/fixtures/.*\.jsonl$''',
    # Lockfile contains hashes that can false-positive.
    '''uv\.lock$''',
]
