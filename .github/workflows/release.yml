name: Release

on:
  push:
    tags:
      # Require at least vMAJOR.MINOR.PATCH; trailing `*` still permits PEP 440
      # prerelease suffixes (rc1, a2, b3, .dev1) via the `detect-prerelease`
      # job below. Rejects malformed tags like `v1`, `vlatest`, `vfoo` at the
      # trigger level before any runner is provisioned.
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

concurrency:
  # Scope to the tag ref so two tag pushes can't race, but never cancel a
  # release mid-publish — a half-published artifact on PyPI is unrecoverable.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-prerelease:
    # Single source of truth for "is this tag a prerelease". Without this gate,
    # `publish-to-pypi` would run unconditionally — pushing every rc / alpha /
    # beta tag straight to production PyPI and burning the filename slot
    # (PyPI allows yanking but not re-uploading identical filenames).
    name: Detect prerelease tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - id: check
        shell: bash
        run: |
          set -eu
          # PEP 440 prerelease shapes:
          #   - v1.0.0rc1 / v1.0.0a2 / v1.0.0b3      (compact)
          #   - v1.0.0-rc1 / v1.0.0-alpha1            (hyphenated)
          #   - v1.0.0.dev1                           (dev release — also prerelease)
          # PEP 440 .post1 is a STABLE post-release and must NOT be flagged.
          if [[ "$GITHUB_REF_NAME" =~ (-?(rc|a|b|alpha|beta|dev)|\.dev)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build distribution and smoke-test wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          # Cache disabled in the release workflow to avoid cache-poisoning
          # writes from a tag-triggered run; CI populates the cache on every
          # push to main, which is enough.
          enable-cache: false
      - name: Pin Python version
        run: uv python pin 3.12
      - name: Verify tag matches pyproject.toml version
        shell: bash
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          file_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$file_version" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME ($tag) does not match pyproject.toml version $file_version"
            exit 1
          fi
          echo "Tag and pyproject.toml agree on version $tag"
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Verify migrations are bundled in the wheel
        run: |
          set -eu
          unzip -l dist/*.whl | grep -F 'convo/migrations/0001_init.sql' \
            || { echo "ERROR: 0001_init.sql missing from built wheel"; exit 1; }
      - name: Install built wheel as a tool
        run: |
          set -eu
          wheel=$(ls dist/tracine_convo-*.whl)
          uv tool install "$wheel"
      - name: Smoke test the tagged artifact
        env:
          CONVO_DB: /tmp/release-smoke.db
        run: |
          set -eu
          convo --version
          convo --help | head -5
          convo info
      - name: Generate sha256 manifest of built artifacts
        # Captured here so the smoke job can pin its TestPyPI install with
        # --require-hashes — verifying the bytes that landed on TestPyPI
        # match exactly what `uv build` produced one job ago.
        shell: bash
        run: |
          set -eu
          cd dist
          shasum -a 256 ./*.whl ./*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  testpypi-publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: TestPyPi
      url: https://test.pypi.org/p/tracine-convo
    permissions:
      id-token: write  # OIDC token for Trusted Publisher
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Strip non-distribution files before publish
        # The build job ships SHA256SUMS alongside the wheel/sdist so the
        # smoke job can pin its install with --require-hashes. twine (inside
        # the pypa publish action) rejects any non-{whl,tar.gz} entry under
        # dist/ as InvalidDistribution, so move it out before publishing.
        run: rm -f dist/SHA256SUMS
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  testpypi-smoke:
    name: Smoke-test TestPyPI install (${{ matrix.python }} on ${{ matrix.os }})
    needs: testpypi-publish
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Download built distribution (for SHA256SUMS manifest)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Install tracine-convo from TestPyPI with --require-hashes
        shell: bash
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/convo-smoke

          # Build a hash-pinned requirements file from the SHA256SUMS the
          # build job generated. --require-hashes makes pip refuse anything
          # whose downloaded bytes don't match. This catches:
          #   - TestPyPI returning different bytes than we uploaded
          #   - MITM on the install path
          #   - cache poisoning on the runner
          # plus clears scorecard's PinnedDependenciesID rule.
          wheel_hash=$(awk '/\.whl$/ { print $1 }' dist/SHA256SUMS)
          sdist_hash=$(awk '/\.tar\.gz$/ { print $1 }' dist/SHA256SUMS)
          test -n "$wheel_hash" -a -n "$sdist_hash" \
            || { echo "missing hash in dist/SHA256SUMS"; cat dist/SHA256SUMS; exit 1; }

          cat > /tmp/req.txt <<EOF
          tracine-convo==${tag} \\
              --hash=sha256:${wheel_hash} \\
              --hash=sha256:${sdist_hash}
          EOF
          cat /tmp/req.txt

          # TestPyPI indexes a release lazily; retry up to ~2 minutes.
          for attempt in 1 2 3 4 5 6 7 8; do
            if /tmp/convo-smoke/bin/pip install \
                --require-hashes \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                -r /tmp/req.txt; then
              break
            fi
            echo "Install attempt $attempt failed, sleeping 15s..."
            sleep 15
          done
      - name: Verify CLI binary, version, and import
        shell: bash
        env:
          CONVO_DB: /tmp/smoke.db
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          source /tmp/convo-smoke/bin/activate
          which convo
          convo_version=$(convo --version | head -n 1 | awk '{print $NF}')
          test "$convo_version" = "$tag" \
            || { echo "convo --version reported $convo_version, expected $tag"; exit 1; }
          convo --help | grep -q "usage: convo"
          # End-to-end: a fresh DB initializes and `info` reports on it.
          convo info
          /tmp/convo-smoke/bin/python -c "
          import convo, importlib.metadata as m
          assert convo.__version__ == m.version('tracine-convo')
          print('OK', convo.__version__)
          "
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false
      - name: Run full pytest suite against the TestPyPI-installed package
        shell: bash
        run: |
          set -eux
          # Install test-harness deps from pyproject's [dev] extras, which
          # ci.yml's pip-audit job validates --strict against CVEs on every
          # PR. ``--no-emit-project`` keeps the in-tree tracine-convo out of
          # the requirements file so we don't shadow the TestPyPI-installed
          # wheel with the source tree.
          uv export --format requirements-txt --no-hashes --no-emit-project \
            --extra dev > /tmp/smoke-deps.txt
          /tmp/convo-smoke/bin/pip install -r /tmp/smoke-deps.txt

          # Confirm `import convo` resolves to the TestPyPI-installed
          # package, not the in-tree src/. If src/ leaked into sys.path
          # the suite would silently validate the wrong bytes.
          /tmp/convo-smoke/bin/python -c "
          import convo
          assert '/site-packages/' in convo.__file__, \
              f'convo imported from source tree, not installed wheel: {convo.__file__}'
          print('convo imported from:', convo.__file__)
          "

          /tmp/convo-smoke/bin/python -m pytest -q --no-header

  publish-to-pypi:
    name: Publish to PyPI (production)
    needs: [testpypi-smoke, detect-prerelease]
    if: needs.detect-prerelease.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    # Required for PyPI Trusted Publisher: the GitHub environment binds the
    # OIDC subject claim. The user configures this environment in the repo
    # settings with required reviewers; this workflow just references it.
    environment:
      name: pypi
      url: https://pypi.org/project/tracine-convo/
    permissions:
      # Mint the OIDC token PyPI exchanges for an upload credential.
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Strip non-distribution files before publish
        run: rm -f dist/SHA256SUMS
      - name: Publish to PyPI
        # Trusted Publisher exchanges the GitHub OIDC token for a short-lived
        # PyPI upload credential. No password / API token is configured here.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  github-release:
    name: Draft GitHub Release with notes and assets
    needs: [publish-to-pypi, testpypi-smoke, detect-prerelease]
    # Run for both stable and prerelease tags. For prerelease tags
    # `publish-to-pypi` is skipped (gated by detect-prerelease), so accept
    # `success` OR `skipped` on that dependency. testpypi-smoke must
    # always have succeeded — that's the gate that proves the artifacts
    # are sane.
    if: |
      always() &&
      needs.testpypi-smoke.result == 'success' &&
      (needs.publish-to-pypi.result == 'success' || needs.publish-to-pypi.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      # Needed to create the Release and upload assets.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Strip non-distribution files before release upload
        run: rm -f dist/SHA256SUMS
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          # Strip leading 'v' from the tag (v0.1.0 -> 0.1.0) to match
          # Keep-a-Changelog headers like '## [0.1.0] - 2026-04-30'.
          version="${REF_NAME#v}"
          notes_file="$(mktemp)"
          python3 - "$version" "$notes_file" <<'PY'
          import pathlib
          import re
          import sys

          version, out_path = sys.argv[1], sys.argv[2]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")

          # Match '## [<version>]' (with optional trailing date / suffix).
          # The section runs until the next '## [' header or end-of-file.
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              re.DOTALL | re.MULTILINE,
          )
          match = pattern.search(changelog)
          if not match:
              sys.stderr.write(
                  f"warning: no CHANGELOG entry for {version}; using fallback notes\n"
              )
              body = f"Release {version}.\n"
          else:
              body = match.group(1).strip() + "\n"

          pathlib.Path(out_path).write_text(body, encoding="utf-8")
          PY
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
      - name: Create release with built artifacts attached
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.detect-prerelease.outputs.is_prerelease }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -eu
          prerelease_flag=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$NOTES_FILE" \
            ${prerelease_flag:+$prerelease_flag} \
            dist/*.whl dist/*.tar.gz
      # Notify the unified marketplace (TracineHQ/plugins) that a new stable
      # release shipped. `sync-on-release.yml` in plugins receives this
      # dispatch and opens an auto-merge PR bumping marketplace.json's
      # `version` field for convo within minutes. Skipped for prereleases --
      # the marketplace tracks production tags only.
      #
      # Auth is via a GitHub App installed only on TracineHQ/plugins:
      #   vars.PLUGINS_DISPATCH_CLIENT_ID          -- repo variable, App client ID
      #   secrets.PLUGINS_DISPATCH_APP_PRIVATE_KEY -- repo secret, PEM contents
      # If either is unset, the mint step is skipped and the notify step exits
      # 0 with a WARN; the daily cron sync in plugins (sync-marketplace-versions.yml)
      # reconciles within 24h, so a key rotation can never block a release.
      - name: Mint plugins-dispatcher app token
        id: app-token
        if: ${{ needs.detect-prerelease.outputs.is_prerelease == 'false' && vars.PLUGINS_DISPATCH_CLIENT_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.PLUGINS_DISPATCH_CLIENT_ID }}
          private-key: ${{ secrets.PLUGINS_DISPATCH_APP_PRIVATE_KEY }}
          owner: TracineHQ
          repositories: plugins
          # Scope the minted token to exactly what POST /repos/.../dispatches
          # requires. Even if the App is installed with broader rights, the
          # ephemeral token issued for this job will only carry contents:write.
          permission-contents: write
      - name: Notify plugins marketplace
        if: ${{ needs.detect-prerelease.outputs.is_prerelease == 'false' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -eu
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "WARN: plugins-dispatcher app token unavailable; skipping dispatch."
            echo "Check that PLUGINS_DISPATCH_CLIENT_ID (var) and PLUGINS_DISPATCH_APP_PRIVATE_KEY (secret) are set."
            echo "The daily cron in TracineHQ/plugins will sync this version within 24h."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          gh api repos/TracineHQ/plugins/dispatches \
            -f event_type=plugin-released \
            -f client_payload[plugin]=convo \
            -f "client_payload[version]=${version}"
          echo "Dispatched plugin-released event to TracineHQ/plugins (convo ${version})"
