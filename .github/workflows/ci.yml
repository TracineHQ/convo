name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to no permissions; jobs opt in to what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Validate plugin manifests
        run: python3 scripts/validate_plugin_manifest.py
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin (claude CLI, walks command frontmatter)
        run: claude plugin validate .claude-plugin/plugin.json

  vulture:
    name: Vulture dead-code scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run vulture
        run: uv run vulture

  typecheck:
    name: Mypy strict
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Mypy
        run: uv run mypy .

  test:
    name: Test (Python ${{ matrix.python }} on ${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python }}
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build wheel and sdist
        run: uv build
      - name: List artifacts
        run: ls -la dist/
      - name: Verify migrations are bundled in the wheel
        run: |
          set -eu
          unzip -l dist/*.whl | grep -F 'convo/migrations/0001_init.sql' \
            || { echo "ERROR: 0001_init.sql missing from built wheel"; exit 1; }
      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: Smoke (Python ${{ matrix.python }} on ${{ matrix.os }})
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python }}
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Resolve wheel path
        id: wheel
        run: |
          set -eu
          wheel=$(python3 -c "import glob,sys; hits=sorted(glob.glob('dist/*.whl')); print(hits[0] if hits else '', end='')")
          if [ -z "$wheel" ]; then
            echo "ERROR: no wheel found in dist/" >&2
            exit 1
          fi
          echo "path=$wheel" >> "$GITHUB_OUTPUT"
          echo "Selected wheel: $wheel"
      - name: Install convo from built wheel
        env:
          WHEEL_PATH: ${{ steps.wheel.outputs.path }}
        run: uv tool install "$WHEEL_PATH"
      - name: Smoke test command surface
        env:
          CONVO_DB: ${{ runner.temp }}/smoke.db
          CONVO_BACKUP_DIR: ${{ runner.temp }}/smoke-backups
          CLAUDE_PROJECTS_DIR: tests/fixtures/qa-projects
        run: |
          set -eu
          mkdir -p "$CONVO_BACKUP_DIR"
          convo index
          convo info
          convo search "tool" --limit 5 --json
          session=$(convo search "tool" --limit 1 --json | python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["search"]["hits"][0]["session_id"][:8])')
          convo inspect "$session" --json
          convo summary --since 30d --json
          convo diff --since 7d --json
          convo backup --auto
          convo snapshots --json
          convo restore --latest
      - name: Smoke bin/convo wrapper (POSIX)
        if: runner.os != 'Windows'
        run: |
          PYTHONPATH=src ./bin/convo --help | head -3
      - name: Smoke bin/convo.cmd wrapper (Windows)
        if: runner.os == 'Windows'
        # cmd is required: this step exercises the bin/convo.cmd wrapper
        # which exists for native Windows cmd.exe / PowerShell users.
        # Switching to pwsh/bash would defeat the purpose of the test.
        # The `misfeature` finding is silenced in .github/zizmor.yml.
        shell: cmd
        run: |
          set PYTHONPATH=src
          call bin\convo.cmd --help

  detect-secrets:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run detect-secrets via pre-commit
        run: uv run pre-commit run detect-secrets --all-files

  bandit:
    name: Bandit security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Run bandit
        run: uv run --with bandit bandit -c pyproject.toml -r src/ -ll

  pip-audit:
    name: Audit dependencies for CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Export requirements
        run: uv export --format requirements-txt --no-hashes --no-emit-project --extra dev > requirements-audit.txt
      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit -r requirements-audit.txt --strict

  workflows-lint:
    name: zizmor (workflow security audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          # Scope to workflow files only; the dependabot config in this repo
          # lives outside this task's ownership and is audited separately.
          inputs: .github/workflows/
          # Default action behavior uploads SARIF to GHAS; the repo does not
          # have GHAS enabled on private/free tier, so emit annotations only.
          advanced-security: false
          annotations: true

  actionlint:
    name: actionlint (workflow syntax + shellcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download actionlint
        id: actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          # Pin the install script by full commit SHA, not by tag — Scorecard
          # PinnedDependenciesID flags tag-pinned download-then-run as
          # bypassable (a tag can be re-pointed). This SHA is v1.7.12.
          ACTIONLINT_SCRIPT_SHA: 914e7df21a07ef503a81201c76d2b11c789d3fca  # pragma: allowlist secret
        run: |
          set -eu
          bash <(curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SCRIPT_SHA}/scripts/download-actionlint.bash") "$ACTIONLINT_VERSION"
          echo "bin=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"
      - name: Run actionlint
        env:
          ACTIONLINT_BIN: ${{ steps.actionlint.outputs.bin }}
        run: |
          set -eu
          "$ACTIONLINT_BIN" -color
