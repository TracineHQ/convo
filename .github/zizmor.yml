# zizmor configuration
# https://docs.zizmor.sh/configuration/
rules:
  misfeature:
    ignore:
      # The Windows leg of the smoke matrix uses `shell: cmd` deliberately:
      # we are smoke-testing bin/convo.cmd, the wrapper that exists for
      # native Windows cmd.exe / PowerShell users. Switching to pwsh/bash
      # would defeat the purpose of the test.
      - ci.yml:209
  superfluous-actions:
    ignore:
      # softprops/action-gh-release gives us release-notes-from-CHANGELOG
      # extraction + asset-attachment in one declarative step. Replacing it
      # with `gh release create` in a `run:` block would mean re-implementing
      # the body_path logic, prerelease detection, and fail_on_unmatched_files
      # behavior in shell. Action is widely used and pinned by SHA.
      - release.yml:143
